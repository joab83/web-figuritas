<div class="backdrop" role="presentation">
  <section class="modal" role="dialog" aria-modal="true" aria-labelledby="reservation-title">
    <h2 id="reservation-title">Datos para tu reserva</h2>
    <p>Ingresá tu teléfono. Lo usamos para identificarte y avisarte por WhatsApp cuando termines el pedido.</p>

    <form (ngSubmit)="submit()">
      <label>
        <span>Teléfono</span>
        <input
          type="tel"
          name="phone"
          autocomplete="tel"
          inputmode="tel"
          required
          [(ngModel)]="phone"
        />
      </label>

      <label>
        <span>Nombre (opcional)</span>
        <input type="text" name="name" autocomplete="name" [(ngModel)]="name" />
      </label>

      <div class="actions">
        <button type="button" class="secondary" (click)="cancelled.emit()">Cancelar</button>
        <button type="submit" class="primary" [disabled]="!phone.trim()">Continuar</button>
      </div>
    </form>
  </section>
</div>
